org.gradle.jvmargs=-Xmx2G
android.useAndroidX=true
android.enableJetifier=true
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false

# Force Gradle to run and compile using the fully-featured system Java 17 JDK
org.gradle.java.home=/usr/lib/jvm/java-17-openjdk-amd64

# Disable automatic JVM detection to prevent choosing the incomplete Java 21 JRE (which lacks JAVA_COMPILER)
org.gradle.java.installations.auto-detect=false
# Explicitly point the Gradle Java toolchain finder to the fully-featured Java 17 JDK
org.gradle.java.installations.paths=/usr/lib/jvm/java-17-openjdk-amd64

