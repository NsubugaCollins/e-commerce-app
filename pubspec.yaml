name: campus_mall_mobile
description: Campus Mall mobile shopping app for students.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  provider: ^6.1.2
  go_router: ^14.6.2
  flutter_secure_storage: ^9.2.2
  cached_network_image: ^3.4.1
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  image_picker: ^1.1.2
  url_launcher: ^6.3.1
  file_picker: ^8.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: "ic_launcher"
  image_path: "assets/images/MAIN LOGO 2.png"
  adaptive_icon_background: "#FF5733"
  adaptive_icon_foreground: "assets/images/MAIN LOGO 2.png"
  min_sdk_android: 21
